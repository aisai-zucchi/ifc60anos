# Bloco HTTP (porta 8080 e porta 80)
# Aceita tráfego na porta 8080 (acesso direto) e na porta 80 (validação do Certbot)
server {
    listen 8080;
    listen 80;
    server_name historia.concordia.ifc.edu.br;

    # Permite upload de arquivos grandes no CMS (até 100MB)
    client_max_body_size 100M;

    # Compactação Gzip para carregar o site mais rápido
    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Localização do desafio ACME (Usado pelo Certbot para validar seu domínio)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Pasta de Mídia (Servida diretamente pelo Nginx para maior performance)
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy para a aplicação Next.js (Encaminha o tráfego para o container 'app')
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tempos de espera para evitar erros em requisições demoradas
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# Bloco HTTPS (porta 443)
# O Docker Compose cria um certificado temporário automaticamente na primeira vez
# Depois de rodar o Certbot, o certificado real substitui o temporário sem intervenção
server {
    listen 443 ssl;
    server_name historia.concordia.ifc.edu.br;

    # Caminhos para os certificados (criados automaticamente pelo Docker Compose)
    ssl_certificate /etc/letsencrypt/live/historia.concordia.ifc.edu.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/historia.concordia.ifc.edu.br/privkey.pem;

    # Permite upload de arquivos grandes no CMS (até 100MB)
    client_max_body_size 100M;

    # Compactação Gzip para carregar o site mais rápido
    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Pasta de Mídia (Servida diretamente pelo Nginx para maior performance)
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy para a aplicação Next.js via HTTPS
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tempos de espera para evitar erros em requisições demoradas
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
