services:
  # Serviço do Banco de Dados PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: ifc60anos_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-payload}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-payload_password}
      POSTGRES_DB: ${DB_NAME:-ifc60anos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Serviço da Aplicação Next.js + Payload CMS
  app:
    build:
      context: .
      args:
        PAYLOAD_SECRET: ${PAYLOAD_SECRET}
        DATABASE_URI: postgresql://${DB_USER:-payload}:${DB_PASSWORD:-payload_password}@db:5432/${DB_NAME:-ifc60anos}
    container_name: ifc60anos_app
    restart: always
    env_file: .env
    environment:
      DATABASE_URI: postgresql://${DB_USER:-payload}:${DB_PASSWORD:-payload_password}@db:5432/${DB_NAME:-ifc60anos}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NODE_ENV: production
    depends_on:
      - db

  # Serviço do Servidor Nginx (Proxy Reverso)
  nginx:
    image: nginx:alpine
    container_name: ifc60anos_nginx
    restart: always
    ports:
      - "8080:8080"
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./media:/app/media
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Cria certificado temporário se não existir para o Nginx não crashar na primeira vez
    command: "/bin/sh -c '
      mkdir -p /etc/letsencrypt/live/${CERTBOT_DOMAIN} &&
      if [ ! -f /etc/letsencrypt/live/${CERTBOT_DOMAIN}/fullchain.pem ]; then
        openssl req -x509 -nodes -newkey rsa:2048 -days 1
          -keyout /etc/letsencrypt/live/${CERTBOT_DOMAIN}/privkey.pem
          -out /etc/letsencrypt/live/${CERTBOT_DOMAIN}/fullchain.pem
          -subj \"/CN=${CERTBOT_DOMAIN}\";
      fi;
      nginx -g \"daemon off;\"'"
    environment:
      CERTBOT_DOMAIN: ${CERTBOT_DOMAIN}
    depends_on:
      - app

  # Serviço do Certbot para SSL automático
  # Na primeira inicialização: gera o certificado real Let's Encrypt
  # Depois: renova automaticamente a cada 12 horas e recarrega o Nginx
  certbot:
    image: certbot/certbot
    container_name: ifc60anos_certbot
    restart: always
    environment:
      CERTBOT_DOMAIN: ${CERTBOT_DOMAIN}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Espera 30s para o Nginx subir, tenta obter certificado real, depois entra em loop de renovação
    entrypoint: "/bin/sh -c '
      trap exit TERM;
      echo \"Aguardando Nginx iniciar...\";
      sleep 30;
      if [ ! -d /etc/letsencrypt/renewal ]; then
        echo \"Gerando certificado Let s Encrypt para $CERTBOT_DOMAIN...\";
        certbot certonly --webroot --webroot-path /var/www/certbot
          -d $CERTBOT_DOMAIN
          --email $CERTBOT_EMAIL
          --agree-tos --no-eff-email --force-renewal;
        echo \"Certificado gerado! Recarregando Nginx...\";
      fi;
      while :; do
        certbot renew;
        sleep 12h & wait $${!};
      done'"
    depends_on:
      - nginx

volumes:
  postgres_data:
