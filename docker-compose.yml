services:
  # Serviço do Banco de Dados PostgreSQL
  db:
    image: postgres:16-alpine # Versão estável do PostgreSQL
    container_name: ifc60anos_db
    restart: always # Reinicia o container se ele cair ou o servidor reiniciar
    environment:
      # Credenciais do banco (buscadas do arquivo .env ou com valores padrão)
      POSTGRES_USER: ${DB_USER:-payload}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-payload_password}
      POSTGRES_DB: ${DB_NAME:-ifc60anos}
    volumes:
      # Persistência de dados do banco em um volume Docker
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Mapeia a porta padrão do Postgres (5432) para o host
      - "5432:5432"

  # Serviço da Aplicação Next.js + Payload CMS
  app:
    build: . # Constrói a imagem a partir do Dockerfile na raiz
    container_name: ifc60anos_app
    restart: always
    environment:
      # URL de conexão com o banco de dados dentro da rede do Docker
      DATABASE_URI: postgresql://${DB_USER:-payload}:${DB_PASSWORD:-payload_password}@db:5432/${DB_NAME:-ifc60anos}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NODE_ENV: production
    depends_on:
      - db # Garante que o banco suba antes da aplicação

  # Serviço do Servidor Nginx (Proxy Reverso)
  nginx:
    image: nginx:alpine
    container_name: ifc60anos_nginx
    restart: always
    ports:
      - "8080:8080" # Porta principal de acesso ao sistema
      - "80:80"     # Porta necessária para a renovação do Certbot (desafio ACME)
      - "443:443"   # Porta para tráfego seguro (HTTPS)
    volumes:
      # Mapeamento do arquivo de configuração e pastas para SSL e Mídia
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./media:/app/media
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app # O Nginx depende da aplicação rodando para encaminhar o tráfego

  # Serviço do Certbot para SSL automático
  certbot:
    image: certbot/certbot
    container_name: ifc60anos_certbot
    restart: always
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Script que tenta renovar o certificado a cada 12 horas
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  # Volume nomeado para garantir que os dados do banco não sejam perdidos ao apagar containers
  postgres_data:
